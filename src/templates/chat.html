<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="full-body-container">
    <div class="chat-brand">
      <div class="chat-brand-icon">🍽️</div>
      <div>
        <h1>MealMap Chat</h1>
        <p>Ask anything about recipes, nutrition, or meals.</p>
      </div>
    </div>

    <div id="messages">
      <div id="loading-indicator" class="loading-indicator" aria-hidden="true">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
    </div>

    <div class="chat-bar">
      <form id="chat-form" class="input-row">
        <input type="text" placeholder="Ask about a recipe or meal…" id="user-input" autocomplete="off" />
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const chatInput = document.getElementById("user-input");
    const loadingEl = document.getElementById("loading-indicator");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(text, isUser) {
      const div = document.createElement("div");
      div.className = isUser ? "message user" : "message assistant";
      const p = document.createElement("p");
      p.textContent = text;
      div.appendChild(p);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function setLoading(on) {
      chatInput.disabled = on;
      sendBtn.disabled = on;
      loadingEl.setAttribute("aria-hidden", !on);
      loadingEl.classList.toggle("visible", on);
      if (on) {
        messagesEl.appendChild(loadingEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      chatInput.value = "";
      setLoading(true);

      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      }).then(function (res) {
        if (!res.ok) {
          return res.json().then(function (data) {
            addMessage("Error: " + (data.error || res.status), false);
            setLoading(false);
          });
        }
        var assistantDiv = null;
        var p = null;
        var buffer = "";
        var reader = res.body.getReader();
        var decoder = new TextDecoder();

        function processChunk(result) {
          if (result.done) { setLoading(false); return; }
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split("\n");
          buffer = lines.pop();
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith("data: ")) {
              try {
                var data = JSON.parse(line.slice(6));
                if (data.error) {
                  if (!assistantDiv) assistantDiv = addMessage("", false);
                  assistantDiv.querySelector("p").textContent = "Error: " + data.error;
                  setLoading(false);
                  return;
                }
                if (data.content !== undefined) {
                  if (!assistantDiv) {
                    assistantDiv = addMessage("", false);
                    p = assistantDiv.querySelector("p");
                    setLoading(false);
                  }
                  p.textContent += data.content;
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                }
              } catch (err) {}
            }
          }
          return reader.read().then(processChunk);
        }
        return reader.read().then(processChunk);
      }).catch(function () {
        addMessage("Something went wrong. Check the console.", false);
        setLoading(false);
      });
    });
  </script>
</body>
</html>
