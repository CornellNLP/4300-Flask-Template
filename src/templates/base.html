<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symptom Diagnosis</title>
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            color: #3b82f6;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
        }
        .header p {
            color: #64748b;
            font-size: 1.1rem;
        }
        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .search-box textarea {
            width: 100%;
            height: 120px;
            padding: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            transition: border-color 0.15s ease;
            box-sizing: border-box;
        }
        .search-box textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .search-box button {
            align-self: flex-end;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }
        .search-box button:hover {
            background-color: #2563eb;
        }
        .search-box button:active {
            transform: scale(0.98);
        }
        .result-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: #ffffff;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 0.75rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-score {
            font-size: 0.875rem;
            background: #dbeafe;
            color: #1e40af;
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
        }
        .result-symptoms {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
            line-height: 1.5;
        }
        .result-symptoms strong {
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Symptom Diagnosis</h1>
            <p>Describe your symptoms below to get potential illnesses ranked by matched keywords.</p>
        </div>
        
        <div class="search-box">
            <textarea id="symptom-input" placeholder="e.g. I have a headache, slight fever, and I've been feeling dizzy..."></textarea>
            <button onclick="analyzeSymptoms()">Analyze Symptoms</button>
        </div>
        
        <div id="results-container"></div>
    </div>

    <script>
        function createResultCard(disease, score, matchedSymptoms) {
            return `
                <div class="result-card">
                    <h3 class="result-title">
                        ${disease}
                        <span class="result-score">Matches: ${score}</span>
                    </h3>
                    <p class="result-symptoms">
                        <strong>Matched Keywords:</strong> ${matchedSymptoms || 'None'}
                    </p>
                </div>
            `;
        }

        function analyzeSymptoms() {
            const input = document.getElementById("symptom-input").value;
            const resultsContainer = document.getElementById("results-container");
            
            if (!input.trim()) {
                resultsContainer.innerHTML = "<p style='text-align: center; color: #64748b;'>Please enter some symptoms to analyze.</p>";
                return;
            }
            
            resultsContainer.innerHTML = "<p style='text-align: center; color: #64748b;'>Analyzing...</p>";
            
            // Note: We use /search endpoint as defined in our routes.py
            fetch("/search?" + new URLSearchParams({ query: input }).toString())
                .then((response) => response.json())
                .then((data) => {
                    resultsContainer.innerHTML = "";
                    if (data.length === 0) {
                        resultsContainer.innerHTML = "<p style='text-align: center; color: #64748b;'>No matching illnesses found for these symptoms.</p>";
                        return;
                    }
                    
                    data.forEach(item => {
                        const cardHTML = createResultCard(item.disease, item.score, item.matched_symptoms);
                        resultsContainer.insertAdjacentHTML('beforeend', cardHTML);
                    });
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    resultsContainer.innerHTML = "<p style='text-align: center; color: #ef4444;'>An error occurred while analyzing symptoms.</p>";
                });
        }
    </script>
</body>
</html>
