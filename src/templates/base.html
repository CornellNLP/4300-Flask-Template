<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMap</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand-block">
        <p class="eyebrow">CS 4300 Project</p>
        <h1>MealMap</h1>
        <p class="subtitle">
          Search with TF-IDF or SVD, choose the closest dish, then re-rank it by your nutrition goal.
        </p>
      </div>
      <div id="metaPills" class="meta-pills"></div>
    </header>

    <main class="layout">
      <section class="panel search-panel">
        <div class="search-card">
          <label class="section-label" for="searchInput">Search for a food or dish</label>
          <div class="search-row">
            <input id="searchInput" type="text" placeholder="ex: chicken alfredo, turkey chili, veggie pasta" />
            <button id="searchButton" type="button">Search</button>
          </div>

          <div style="margin-bottom: 18px;">
            <label class="section-label" for="modelSelect">Retrieval model</label>
            <select id="modelSelect" style="width: 100%; padding: 14px 15px; border-radius: 14px; border: 1px solid #dbe4ee; background: #fff;">
              <option value="svd">SVD semantic search</option>
              <option value="tfidf">TF-IDF lexical search</option>
            </select>
          </div>

          <div class="filters-header">
            <div>
              <p class="filters-title">Nutrition goal</p>
              <p class="filters-subtitle">Pick one to re-rank the recipes.</p>
            </div>
            <button id="clearFiltersButton" class="ghost-btn" type="button">Clear</button>
          </div>

          <div id="nutrientFilters" class="filters">
            <button class="filter-btn" data-diet="high_protein">High Protein</button>
            <button class="filter-btn" data-diet="low_carb">Low Carb</button>
            <button class="filter-btn" data-diet="keto">Keto</button>
            <button class="filter-btn" data-diet="low_calorie">Low Calorie</button>
            <button class="filter-btn" data-diet="low_fat">Low Fat</button>
            <button class="filter-btn" data-diet="low_sodium">Low Sodium</button>
            <button class="filter-btn" data-diet="balanced">Balanced</button>
            <button class="filter-btn" data-diet="bodybuilding">Bodybuilding</button>
            <button class="filter-btn" data-diet="vegan">Vegan</button>
          </div>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <div>
            <p class="section-label">Results</p>
            <h2 id="resultsTitle">Search to get started</h2>
          </div>
          <div id="activeState" class="active-state"></div>
        </div>

        <div id="statusMessage" class="status"></div>
        <div id="recipesGrid" class="grid"></div>
      </section>
    </main>
  </div>

  <div id="recipeModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button id="closeModalButton" class="close-modal" aria-label="Close modal">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
